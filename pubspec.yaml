name: ai_image_generator
description: A new Flutter project.
version: 1.0.0+1
environment:
  sdk: ^3.12.0
dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.2
  connectivity_plus: ^7.2.0
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0
  pin_code_fields: ^8.0.1
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^1.2.1
  sms_autofill: ^2.4.1
  intl: ^0.20.2
  colorful_safe_area: ^1.0.0
  pinput: ^5.0.1
  image_picker: ^1.1.2
  fluttertoast: ^9.1.0
  image_gallery_saver_plus: ^5.0.0
  image_painter: ^0.7.1
  open_filex: ^4.7.0
  page_transition: ^2.2.1
  flutter_staggered_animations: ^1.1.1
  share_plus: ^11.0.0
dev_dependencies: 
  flutter_test: 
    sdk: flutter
flutter: 
  uses-material-design: true
  assets: 
    - assets/
    - assets/images/
  fonts: 
    - family: Open Sans
      fonts: 
        - asset: assets/fonts/OpenSansBold.ttf
          weight: 700
        - asset: assets/fonts/OpenSansSemiBold.ttf
          weight: 600
        - asset: assets/fonts/OpenSansRegular.ttf
          weight: 400
        - asset: assets/fonts/OpenSansRomanRegular.ttf
          weight: 400
        - asset: assets/fonts/OpenSansRomanSemiBold.ttf
          weight: 600
    - family: Poppins
      fonts: 
        - asset: assets/fonts/PoppinsSemiBold.ttf
          weight: 600
    - family: Archivo Black Regular
      fonts:
        - asset: assets/fonts/ArchivoBlack-Regular.ttf
          weight: 500
    - family: Roboto
      fonts: 
        - asset: assets/fonts/RobotoRomanSemiBold.ttf
          weight: 600
    - family: Oswald
      fonts: 
        - asset: assets/fonts/OswaldSemiBold.ttf
          weight: 600
    - family: Montserrat
      fonts: 
        - asset: assets/fonts/MontserratRomanSemiBold.ttf
          weight: 600
    - family: Lato
      fonts: 
        - asset: assets/fonts/LatoSemiBold.ttf
          weight: 600
    - family: Urbanist
      fonts: 
        - asset: assets/fonts/UrbanistRomanMedium.ttf
          weight: 500
